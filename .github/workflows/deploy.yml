name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod]

permissions:
  id-token: write
  contents: read

jobs:
  build-rust:
    name: Build Rust Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/aws/api-lambda
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: infra/aws/api-lambda

      - name: Install cargo-lambda
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: cargo-lambda/cargo-lambda

      - name: Build
        run: cargo lambda build --release --arm64

      - uses: actions/upload-artifact@v4
        with:
          name: api-lambda
          path: infra/aws/api-lambda/target/lambda/api-lambda/bootstrap

  deploy:
    name: CDK deploy
    needs: build-rust
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/aws/cdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-lambda
          path: infra/aws/api-lambda/target/lambda/api-lambda/

      - name: Make bootstrap executable
        run: chmod +x ../api-lambda/target/lambda/api-lambda/bootstrap

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infra/aws/cdk/requirements.txt

      - name: Install CDK deps
        run: pip install -r requirements.txt

      - name: CDK deploy
        run: cdk deploy --require-approval never
